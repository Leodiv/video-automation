<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion réussie — FlowPublish</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box { max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; }
        .check { font-size: 48px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="check">✅</div>
        <h1>Connexion réussie</h1>
        <p id="status">Authentification TikTok en cours de traitement...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        if (code) {
            document.getElementById('status').innerText = 
                'Votre compte TikTok a été connecté avec succès. Vous pouvez fermer cette fenêtre.';
        } else if (error) {
            document.getElementById('status').innerText = 
                'La connexion a échoué. Veuillez réessayer.';
        }
    </script>
</body>
</html>
